<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>펭귄 무전기</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app-container">
        <header>🐧 펭귄 무전기 & 톡</header>
        
        <div style="text-align: center; padding: 20px; border-bottom: 1px solid #ddd;">
            <div id="status" style="font-weight: bold; color: red; margin-bottom: 10px;">기지국 찾는 중... 📡</div>
            <button id="talkBtn">PUSH TO TALK</button>
        </div>

        <div id="chat-box"></div>

        <div id="input-area">
            <input type="text" id="user-input" placeholder="메시지 입력...">
            <button id="send-btn">전송</button>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
